<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Bella Olonje</title>
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <div class="app-viewport">
    <section class="app-frame app-frame--extended">
      <div class="welcome-hero">
        <img class="access-brand" src="assets/images/logo-large.png" alt="Bella Olonje">
        <nav class="access-tabs">
          <a class="access-tabs__option access-tabs__option--selected" href="login.html">Login</a>
          <a class="access-tabs__option" href="login.html">Sign-up</a>
        </nav>
      </div>
      <form class="credential-form">
        <label class="credential-form__group">
          <span class="credential-form__caption">Email address</span>
          <input type="email" class="credential-form__data" placeholder="Dosamarvis@gmail.com">
        </label>
        <label class="credential-form__group">
          <span class="credential-form__caption">Password</span>
          <input type="password" class="credential-form__data" placeholder="* * * * * * *">
        </label>
        <a class="credential-form__recover" href="login.html">Forgot passcode?</a>
      </form>
      <a class="action-button" href="home.html">Login</a>
    </section>
  </div>
</body>
</html>
